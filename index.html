<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fragments of the dark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inconsolata:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #181823;
      overflow-x: hidden;
      overflow-y: auto;
      height: 300vh;
      cursor: crosshair;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .scroll-container {
      position: absolute;
      top: 0;
      left: 40px;
      z-index: 10;
      pointer-events: none;
      width: 100%;
    }

    .text-block {
      margin-top: 85vh;
      margin-bottom: 60vh;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
      animation: driftIn 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .title {
      font-family: 'Caveat', cursive;
      font-size: 30px;
      color: #e8e0d0;
      margin: 0 0 6px 0;
      letter-spacing: 0.8px;
    }

    .subtitle {
      font-family: 'Inconsolata', monospace;
      font-size: 13px;
      color: #7d8491;
      margin: 0;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    @keyframes driftIn {
      from {
        opacity: 0;
        transform: translateY(8px);
        filter: blur(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }
  </style>
</head>

<body>
  <div class="scroll-container">
    <div class="text-block">
      <h1 class="title">Fragments of the Dark</h1>
      <p class="subtitle">obs. log #04 // late-night wanderings on the bedroom ceiling</p>
    </div>
    <div class="text-block">
      <h1 class="title">A Silent Orbit</h1>
      <p class="subtitle">obs. log #05 // discovering new geometry</p>
    </div>
    <div class="text-block">
      <h1 class="title">Into the Void</h1>
      <p class="subtitle">obs. log #06 // drifting further away</p>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    let scene, cam, renderer, clock;
    let planet, ring, starsBackground, starsForeground, ico, extraShape;
    let targetX = 0, targetY = 0;
    let scrollY = 0;

    function makePlanetTexture() {
      let canvas = document.createElement('canvas');
      canvas.width = canvas.height = 512;
      let ctx = canvas.getContext('2d');
      // Made base slightly brighter
      ctx.fillStyle = '#0f1426';
      ctx.fillRect(0, 0, 512, 512);

      for (let i = 0; i < 25; i++) {
        let x = Math.random() * 512;
        let y = Math.random() * 512;
        let r = Math.random() * 120 + 40;
        let grad = ctx.createRadialGradient(x, y, 0, x, y, r);
        grad.addColorStop(0, Math.random() > 0.4 ? 'rgba(34, 66, 109, 0.8)' : 'rgba(25, 88, 102, 0.7)');
        grad.addColorStop(1, 'rgba(15, 20, 38, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 512);
      }

      for (let i = 0; i < 150; i++) {
        let x = Math.random() * 512;
        let y = Math.random() * 512;
        let size = Math.random() * 1.5 + 0.5;
        ctx.fillStyle = `rgba(232, 224, 208, ${Math.random() * 0.4})`;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }
      return new THREE.CanvasTexture(canvas);
    }

    function makeRoughnessTexture() {
      let canvas = document.createElement('canvas');
      canvas.width = canvas.height = 256;
      let ctx = canvas.getContext('2d');
      ctx.fillStyle = '#777';
      ctx.fillRect(0, 0, 256, 256);

      for (let i = 0; i < 1200; i++) {
        let x = Math.random() * 256;
        let y = Math.random() * 256;
        let val = Math.floor(Math.random() * 180);
        ctx.fillStyle = `rgb(${val},${val},${val})`;
        ctx.fillRect(x, y, 1, Math.random() * 4 + 1);
      }
      return new THREE.CanvasTexture(canvas);
    }

    function init() {
      scene = new THREE.Scene();
      clock = new THREE.Clock();

      cam = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      cam.position.z = 8;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      // Lightened the scene
      let ambient = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambient);

      let point = new THREE.PointLight(0xffd4a0, 4.0, 40);
      point.position.set(-5, 5, 3);
      scene.add(point);

      let planetGeo = new THREE.SphereGeometry(1.2, 32, 32);
      let planetMat = new THREE.MeshStandardMaterial({
        map: makePlanetTexture(),
        roughness: 0.85
      });
      planet = new THREE.Mesh(planetGeo, planetMat);
      scene.add(planet);

      let ringGeo = new THREE.TorusGeometry(2.0, 0.12, 16, 100);
      let ringMat = new THREE.MeshStandardMaterial({
        color: 0x3a485e,
        roughnessMap: makeRoughnessTexture(),
        roughness: 0.7
      });
      ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2.3;
      scene.add(ring);

      let bgCount = 600;
      let bgGeo = new THREE.BufferGeometry();
      let bgPos = new Float32Array(bgCount * 3);
      for (let i = 0; i < bgCount * 3; i += 3) {
        let theta = Math.random() * Math.PI * 2;
        let phi = Math.acos((Math.random() * 2) - 1);
        let dist = 20 + Math.random() * 15;
        bgPos[i] = dist * Math.sin(phi) * Math.cos(theta);
        bgPos[i + 1] = dist * Math.sin(phi) * Math.sin(theta);
        bgPos[i + 2] = dist * Math.cos(phi);
      }
      bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
      let bgMat = new THREE.PointsMaterial({
        color: 0xa5b4fc,
        size: 0.02,
        transparent: true,
        opacity: 0.6
      });
      starsBackground = new THREE.Points(bgGeo, bgMat);
      scene.add(starsBackground);

      let fgCount = 200;
      let fgGeo = new THREE.BufferGeometry();
      let fgPos = new Float32Array(fgCount * 3);
      for (let i = 0; i < fgCount * 3; i += 3) {
        let theta = Math.random() * Math.PI * 2;
        let phi = Math.acos((Math.random() * 2) - 1);
        let dist = 10 + Math.random() * 12;
        fgPos[i] = dist * Math.sin(phi) * Math.cos(theta);
        fgPos[i + 1] = dist * Math.sin(phi) * Math.sin(theta);
        fgPos[i + 2] = dist * Math.cos(phi);
      }
      fgGeo.setAttribute('position', new THREE.BufferAttribute(fgPos, 3));
      let fgMat = new THREE.PointsMaterial({
        color: 0xffedd5,
        size: 0.04,
        transparent: true,
        opacity: 0.9
      });
      starsForeground = new THREE.Points(fgGeo, fgMat);
      scene.add(starsForeground);

      let icoGeo = new THREE.IcosahedronGeometry(0.28, 0);
      let icoMat = new THREE.MeshStandardMaterial({
        color: 0x8a9eb2,
        flatShading: true,
        roughness: 0.6
      });
      ico = new THREE.Mesh(icoGeo, icoMat);
      ico.position.set(1.7, -0.6, 1.4);
      scene.add(ico);

      // New extra shape
      let extraGeo = new THREE.OctahedronGeometry(0.5, 0);
      let extraMat = new THREE.MeshStandardMaterial({
        color: 0x5a7d9c,
        wireframe: true,
        transparent: true,
        opacity: 0.7
      });
      extraShape = new THREE.Mesh(extraGeo, extraMat);
      extraShape.position.set(-2.5, -3.0, 0.5); // Starts below the initial view
      scene.add(extraShape);

      window.addEventListener('mousemove', (e) => {
        targetX = (e.clientX / window.innerWidth - 0.5) * 0.1;
        targetY = (e.clientY / window.innerHeight - 0.5) * 0.1;
      });

      window.addEventListener('scroll', () => {
        scrollY = window.scrollY;
      });

      window.addEventListener('resize', () => {
        cam.aspect = window.innerWidth / window.innerHeight;
        cam.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      });
    }

    function animate() {
      requestAnimationFrame(animate);

      let t = clock.getElapsedTime();

      if (ring) {
        ring.rotation.x += 0.002;
        ring.rotation.y += 0.001;
      }
      if (planet) {
        planet.rotation.y += 0.0008;
      }

      if (ico) {
        ico.position.y = -0.6 + Math.sin(t) * 0.15 + (scrollY * 0.001); // Also slightly moves with scroll
        ico.rotation.x += 0.004;
        ico.rotation.y += 0.002;
      }

      if (extraShape) {
        extraShape.rotation.x -= 0.005;
        extraShape.rotation.y -= 0.003;
        // Moves up as you scroll down
        extraShape.position.y = -3.0 + (scrollY * 0.004);
      }

      if (starsForeground && starsBackground) {
        starsForeground.material.opacity = 0.75 + Math.sin(t * 1.5) * 0.15;
        starsBackground.material.opacity = 0.45 + Math.sin(t * 0.8) * 0.1;
      }

      // Camera moves slightly with scroll to create a parallax effect with the objects
      if (cam) {
        cam.position.z = 8.0 + Math.sin(t * 0.4) * 0.12;
        cam.position.y = -(scrollY * 0.0015);
      }

      scene.rotation.y += (targetX - scene.rotation.y) * 0.05;
      scene.rotation.x += (targetY - scene.rotation.x) * 0.05;

      renderer.render(scene, cam);
    }

    init();
    animate();
  </script>
</body>

</html>
