<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fragments of the dark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inconsolata:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0f;
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .overlay {
      position: absolute;
      bottom: 40px;
      left: 40px;
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
      animation: driftIn 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .title {
      font-family: 'Caveat', cursive;
      font-size: 30px;
      color: #e8e0d0;
      margin: 0 0 6px 0;
      letter-spacing: 0.8px;
    }

    .subtitle {
      font-family: 'Inconsolata', monospace;
      font-size: 13px;
      color: #7d8491;
      margin: 0;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    @keyframes driftIn {
      from {
        opacity: 0;
        transform: translateY(8px);
        filter: blur(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <h1 class="title">Fragments of the Dark</h1>
    <p class="subtitle">obs. log #04 // late-night wanderings on the bedroom ceiling</p>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    let scene, cam, renderer, clock;
    let planet, ring, starsBackground, starsForeground, ico;
    let targetX = 0, targetY = 0;

    function makePlanetTexture() {
      let canvas = document.createElement('canvas');
      canvas.width = canvas.height = 512;
      let ctx = canvas.getContext('2d');
      ctx.fillStyle = '#080a14';
      ctx.fillRect(0, 0, 512, 512);

      // soft watercolor nebulous dust
      for (let i = 0; i < 25; i++) {
        let x = Math.random() * 512;
        let y = Math.random() * 512;
        let r = Math.random() * 120 + 40;
        let grad = ctx.createRadialGradient(x, y, 0, x, y, r);
        grad.addColorStop(0, Math.random() > 0.4 ? 'rgba(24, 46, 79, 0.7)' : 'rgba(15, 68, 82, 0.6)');
        grad.addColorStop(1, 'rgba(8, 10, 20, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 512);
      }

      // tiny star-craters on surface
      for (let i = 0; i < 150; i++) {
        let x = Math.random() * 512;
        let y = Math.random() * 512;
        let size = Math.random() * 1.5 + 0.5;
        ctx.fillStyle = `rgba(232, 224, 208, ${Math.random() * 0.25})`;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }
      return new THREE.CanvasTexture(canvas);
    }

    function makeRoughnessTexture() {
      let canvas = document.createElement('canvas');
      canvas.width = canvas.height = 256;
      let ctx = canvas.getContext('2d');
      ctx.fillStyle = '#666';
      ctx.fillRect(0, 0, 256, 256);

      // scratchy graphite-like grain
      for (let i = 0; i < 1200; i++) {
        let x = Math.random() * 256;
        let y = Math.random() * 256;
        let val = Math.floor(Math.random() * 180);
        ctx.fillStyle = `rgb(${val},${val},${val})`;
        ctx.fillRect(x, y, 1, Math.random() * 4 + 1);
      }
      return new THREE.CanvasTexture(canvas);
    }

    function init() {
      scene = new THREE.Scene();
      clock = new THREE.Clock();

      cam = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      cam.position.z = 8;

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      // lighting: compliant with constraints while remaining moody
      let ambient = new THREE.AmbientLight(0xffffff, 0.3);
      scene.add(ambient);

      let point = new THREE.PointLight(0xffd4a0, 2.0, 30);
      point.position.set(-5, 5, 3);
      scene.add(point);

      // 1. Planet
      let planetGeo = new THREE.SphereGeometry(1.2, 32, 32);
      let planetMat = new THREE.MeshStandardMaterial({
        map: makePlanetTexture(),
        roughness: 0.85
      });
      planet = new THREE.Mesh(planetGeo, planetMat);
      scene.add(planet);

      // 2. Torus (Saturn-like ring)
      let ringGeo = new THREE.TorusGeometry(2.0, 0.12, 16, 100);
      let ringMat = new THREE.MeshStandardMaterial({
        color: 0x242e3d,
        roughnessMap: makeRoughnessTexture(),
        roughness: 0.7
      });
      ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2.3;
      scene.add(ring);

      // 3. Stars (layered particle system for spatial depth)
      let bgCount = 600;
      let bgGeo = new THREE.BufferGeometry();
      let bgPos = new Float32Array(bgCount * 3);
      for (let i = 0; i < bgCount * 3; i += 3) {
        let theta = Math.random() * Math.PI * 2;
        let phi = Math.acos((Math.random() * 2) - 1);
        let dist = 20 + Math.random() * 15;
        bgPos[i] = dist * Math.sin(phi) * Math.cos(theta);
        bgPos[i + 1] = dist * Math.sin(phi) * Math.sin(theta);
        bgPos[i + 2] = dist * Math.cos(phi);
      }
      bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
      let bgMat = new THREE.PointsMaterial({
        color: 0xa5b4fc,
        size: 0.02,
        transparent: true,
        opacity: 0.4
      });
      starsBackground = new THREE.Points(bgGeo, bgMat);
      scene.add(starsBackground);

      let fgCount = 200;
      let fgGeo = new THREE.BufferGeometry();
      let fgPos = new Float32Array(fgCount * 3);
      for (let i = 0; i < fgCount * 3; i += 3) {
        let theta = Math.random() * Math.PI * 2;
        let phi = Math.acos((Math.random() * 2) - 1);
        let dist = 10 + Math.random() * 12;
        fgPos[i] = dist * Math.sin(phi) * Math.cos(theta);
        fgPos[i + 1] = dist * Math.sin(phi) * Math.sin(theta);
        fgPos[i + 2] = dist * Math.cos(phi);
      }
      fgGeo.setAttribute('position', new THREE.BufferAttribute(fgPos, 3));
      let fgMat = new THREE.PointsMaterial({
        color: 0xffedd5,
        size: 0.04,
        transparent: true,
        opacity: 0.75
      });
      starsForeground = new THREE.Points(fgGeo, fgMat);
      scene.add(starsForeground);

      // 4. Icosahedron (floating, offset by exactly 1.7 units on X)
      let icoGeo = new THREE.IcosahedronGeometry(0.28, 0);
      let icoMat = new THREE.MeshStandardMaterial({
        color: 0x6e8092,
        flatShading: true,
        roughness: 0.6
      });
      ico = new THREE.Mesh(icoGeo, icoMat);
      ico.position.set(1.7, -0.6, 1.4); // intentional offset
      scene.add(ico);

      window.addEventListener('mousemove', (e) => {
        targetX = (e.clientX / window.innerWidth - 0.5) * 0.1;
        targetY = (e.clientY / window.innerHeight - 0.5) * 0.1;
      });

      window.addEventListener('resize', () => {
        cam.aspect = window.innerWidth / window.innerHeight;
        cam.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      });
    }

    function animate() {
      requestAnimationFrame(animate);

      let t = clock.getElapsedTime();

      if (ring) {
        ring.rotation.x += 0.002;
        ring.rotation.y += 0.001;
      }
      if (planet) {
        planet.rotation.y += 0.0008;
      }

      // gentle spin and bobbing for the icosahedron
      if (ico) {
        ico.position.y = -0.6 + Math.sin(t) * 0.15;
        ico.rotation.x += 0.004;
        ico.rotation.y += 0.002;
      }

      // slow starry twinkle/pulsation
      if (starsForeground && starsBackground) {
        starsForeground.material.opacity = 0.65 + Math.sin(t * 1.5) * 0.1;
        starsBackground.material.opacity = 0.35 + Math.sin(t * 0.8) * 0.05;
      }

      // very slow camera breathing to enhance the dreamlike feeling
      if (cam) {
        cam.position.z = 8.0 + Math.sin(t * 0.4) * 0.12;
      }

      // mouse parallax
      scene.rotation.y += (targetX - scene.rotation.y) * 0.05;
      scene.rotation.x += (targetY - scene.rotation.x) * 0.05;

      renderer.render(scene, cam);
    }

    init();
    animate();
  </script>
</body>

</html>
