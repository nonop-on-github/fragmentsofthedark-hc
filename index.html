<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fragments of the dark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inconsolata:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0f;
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .overlay {
      position: absolute;
      bottom: 40px;
      left: 40px;
      z-index: 10;
      pointer-events: none;
    }

    .title {
      font-family: 'Caveat', cursive;
      font-size: 28px;
      color: #e8e0d0;
      margin: 0 0 4px 0;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-family: 'Inconsolata', monospace;
      font-size: 13px;
      color: #888;
      margin: 0;
      font-weight: 300;
    }
  </style>
</head>

<body>
  <div class="overlay">
    <h1 class="title">Fragments of the Dark</h1>
    <p class="subtitle">obs. log #04 // late-night wanderings on the bedroom ceiling</p>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    let scene, cam, renderer, clock;
    let planet, ring, stars, ico;
    let targetX = 0, targetY = 0;

    function makePlanetTexture() {
      let canvas = document.createElement('canvas');
      canvas.width = canvas.height = 512;
      let ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0e1220';
      ctx.fillRect(0, 0, 512, 512);

      // procedural dust and nebulae spots
      for (let i = 0; i < 400; i++) {
        let x = Math.random() * 512;
        let y = Math.random() * 512;
        let r = Math.random() * 4 + 1;
        ctx.fillStyle = Math.random() > 0.4 ? '#182b49' : '#145369';
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      return new THREE.CanvasTexture(canvas);
    }

    function makeRoughnessTexture() {
      let canvas = document.createElement('canvas');
      canvas.width = canvas.height = 256;
      let ctx = canvas.getContext('2d');
      ctx.fillStyle = '#777';
      ctx.fillRect(0, 0, 256, 256);

      // scratchy noise pattern
      for (let i = 0; i < 800; i++) {
        let x = Math.random() * 256;
        let y = Math.random() * 256;
        let val = Math.floor(Math.random() * 150);
        ctx.fillStyle = `rgb(${val},${val},${val})`;
        ctx.fillRect(x, y, 1, 3);
      }
      return new THREE.CanvasTexture(canvas);
    }

    function init() {
      scene = new THREE.Scene();
      clock = new THREE.Clock();

      cam = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      cam.position.z = 8;

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // lights
      let ambient = new THREE.AmbientLight(0xffffff, 0.3);
      scene.add(ambient);

      let point = new THREE.PointLight(0xffd4a0, 1.5, 30);
      point.position.set(-5, 5, 3);
      scene.add(point);

      // 1. Planet
      let planetGeo = new THREE.SphereGeometry(1.2, 32, 32);
      let planetMat = new THREE.MeshStandardMaterial({
        map: makePlanetTexture(),
        roughness: 0.8
      });
      planet = new THREE.Mesh(planetGeo, planetMat);
      scene.add(planet);

      // 2. Torus (Saturn-like ring)
      let ringGeo = new THREE.TorusGeometry(2.0, 0.15, 16, 100);
      let ringMat = new THREE.MeshStandardMaterial({
        color: 0x2e3b4e,
        roughnessMap: makeRoughnessTexture(),
        roughness: 0.6
      });
      ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2.5;
      scene.add(ring);

      // 3. Stars (Particle system)
      let starCount = 800;
      let starGeo = new THREE.BufferGeometry();
      let positions = new Float32Array(starCount * 3);

      for (let i = 0; i < starCount * 3; i += 3) {
        // distribute stars randomly in a sphere
        let theta = Math.random() * Math.PI * 2;
        let phi = Math.acos((Math.random() * 2) - 1);
        let dist = 15 + Math.random() * 20;

        positions[i] = dist * Math.sin(phi) * Math.cos(theta);
        positions[i + 1] = dist * Math.sin(phi) * Math.sin(theta);
        positions[i + 2] = dist * Math.cos(phi);
      }

      starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      let starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.05,
        transparent: true,
        opacity: 0.8
      });
      stars = new THREE.Points(starGeo, starMat);
      scene.add(stars);

      // 4. Icosahedron (Floating/wobbling)
      let icoGeo = new THREE.IcosahedronGeometry(0.3, 0);
      let icoMat = new THREE.MeshStandardMaterial({
        color: 0x889eb0,
        flatShading: true,
        roughness: 0.5
      });
      ico = new THREE.Mesh(icoGeo, icoMat);
      ico.position.set(1.7, 1.2, 0.5); // intentional offset
      scene.add(ico);

      // simple parallax capture
      window.addEventListener('mousemove', (e) => {
        targetX = (e.clientX / window.innerWidth - 0.5) * 0.1;
        targetY = (e.clientY / window.innerHeight - 0.5) * 0.1;
      });

      window.addEventListener('resize', () => {
        cam.aspect = window.innerWidth / window.innerHeight;
        cam.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    function animate() {
      requestAnimationFrame(animate);

      let t = clock.getElapsedTime();

      // slow rotations
      if (ring) {
        ring.rotation.x += 0.002;
        ring.rotation.y += 0.001;
      }
      if (planet) {
        planet.rotation.y += 0.0008;
      }

      // icosahedron bobbing
      if (ico) {
        ico.position.y = 1.2 + Math.sin(t) * 0.2;
      }

      // mouse parallax
      scene.rotation.y += (targetX - scene.rotation.y) * 0.05;
      scene.rotation.x += (targetY - scene.rotation.x) * 0.05;

      renderer.render(scene, cam);
    }

    init();
    animate();
  </script>
</body>

</html>
